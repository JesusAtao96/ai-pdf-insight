# Firebase App Hosting Configuration
# Documentation: https://firebase.google.com/docs/app-hosting/configure

kind: AppHosting
apiVersion: v1

# Runtime settings
runConfig:
  minInstances: 0
  maxInstances: 10
  # CPU/Memory defaults work well for modern Angular
  # cpu: 1
  # memoryMiB: 512

# Environment Variables
# These can also be configured in the Firebase Console
env:
  - name: PROJECT_ID
    value: ai-pdf-insights

# Build settings (autodetected but explicitly set for clarity)
# buildConfig:
#   rootDirectory: ./
